<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Clothing Collection</title>
    <style>
        /* Modern Look के लिए Styles */
        body { font-family: 'Poppins', sans-serif; background: #ececec; margin: 0; padding: 20px; }
        
        header { 
            text-align: center; 
            padding: 40px 20px; 
            background: linear-gradient(135deg, #333, #000); 
            color: white; 
            border-radius: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }

        /* Card Design में सुधार */
        .card { 
            background: white; 
            border-radius: 15px; 
            width: 280px; 
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            transition: all 0.4s ease; 
        }

        .card:hover { 
            transform: translateY(-10px) scale(1.02); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.2); 
        }

        .card img { 
            width: 100%; 
            height: 350px; 
            object-fit: cover; 
            transition: 0.5s;
        }

        /* Hover पर फोटो हल्की ज़ूम होगी */
        .card:hover img { transform: scale(1.1); }

        .info { padding: 20px; text-align: center; }
        .info h3 { margin: 10px 0; color: #222; font-size: 1.4rem; }
        .price { color: #ff4757; font-weight: bold; font-size: 1.3rem; margin-bottom: 15px; display: block; }
        
        .btn { 
            display: inline-block; 
            padding: 10px 25px; 
            background: #2f3542; 
            color: white; 
            text-decoration: none; 
            border-radius: 25px; 
            transition: 0.3s;
            font-weight: 500;
        }

        .btn:hover { background: #ff4757; }
    </style>
</head>
<body>

    <header>
        <h1>✨ My Design Studio</h1>
        <p>Premium Clothing Collection 2024</p>
    </header>

    <div class="gallery">
        <div class="card">
            <img src="images/dress1.jpg" alt="Design 1">
            <div class="info">
                <h3>Kurti Design</h3>
                <span class="price">₹1,200</span>
                <a href="#" class="btn">Buy Now</a>
            </div>
        </div>

        <div class="card">
            <img src="images/dress2.jpg" alt="Design 2">
            <div class="info">
                <h3>Designer Suit</h3>
                <span class="price">₹2,500</span>
                <a href="#" class="btn">Buy Now</a>
            </div>
        </div>

        <div class="card">
            <img src="images/dress3.jpg" alt="Design 3">
            <div class="info">
                <h3>Party Wear</h3>
                <span class="price">₹3,000</span>
                <a href="#" class="btn">Buy Now</a>
            </div>
        </div>
        
        <div class="card">
            <img src="images/dress4.jpg" alt="Design 4">
            <div class="info">
                <h3>Latest Ethnic</h3>
                <span class="price">₹1,800</span>
                <a href="#" class="btn">Buy Now</a>
            </div>
        </div>
    </div>

</body>
</html>
